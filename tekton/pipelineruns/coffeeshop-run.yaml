apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: coffeeshop-deploy-
spec:
  pipelineRef:
    name: coffeeshop-ui-pipeline
  serviceAccountName: pipeline
  podTemplate:
    env:
      - name: BUILDAH_ISOLATION
        value: chroot
  taskRunSpecs:
    - pipelineTaskName: clone-sources
      taskPodTemplate:
        securityContext:
          runAsUser: 0
    - pipelineTaskName: build-app
      taskPodTemplate:
        securityContext:
          runAsUser: 0
  params:
    - name: IMAGE_NAME
      value: image-registry.openshift-image-registry.svc:5000/coffeeshop-pipeline/coffeeshop
    - name: APP_NAME
      value: coffeeshop
    - name: GITHUB_REPO_URL
      value: 'https://github.com/froberge/coffeeshop-ui.git'
    - name: GITHUB_REPO_REVISION
      value: main
  workspaces:
    - name: source
      persistentVolumeClaim:
        claimName: sources-pvc
