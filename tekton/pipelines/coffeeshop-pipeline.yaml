apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: coffeeshop-ui-pipeline
  labels:
    pipeline.openshift.io/runtime: nodejs
    pipeline.openshift.io/runtime-version: 16-ubi8
spec:
  params:
    - name: APP_NAME
      description: The app name
      type: string
    - name: GITHUB_REPO_URL
      description: The github repo to find the application
      type: string
    - name: GITHUB_REPO_REVISION
      description: The github branch to use
      type: string
    - name: IMAGE_NAME
      description: The fully qualified image name.
      type: string
    - name: PATH_CONTEXT
      default: .
      type: string
    - name: VERSION
      default: 16-ubi8
      type: string
  tasks:
    - name: clone-sources
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.GITHUB_REPO_URL)
        - name: REVISION
          value: $(params.GITHUB_REPO_REVISION)
        - name: DELETE_EXISTING
          value: 'true'
      workspaces:
        - name: output
          workspace: source
    - name: build-app
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: s2i-nodejs
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: $(params.IMAGE_NAME)
        - name: TLSVERIFY
          value: 'false'
        - name: PATH_CONTEXT
          value: $(params.PATH_CONTEXT)
        - name: VERSION
          value: $(params.VERSION)
        - name: STORAGE_DRIVER
          value: vfs
        - name: BUILD_EXTRA_ARGS
          value: --isolation=chroot
      runAfter:
        - clone-sources
      workspaces:
        - name: source
          workspace: source
    # - name: deploy-app
    #   taskRef:
    #     kind: ClusterTask
    #     name: openshift-client
    #   params:
    #     - name: SCRIPT
    #       value: oc rollout status deploy/$(params.APP_NAME)
    #   runAfter:
    #     - build-app
  workspaces:
    - name: source
