apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: build-n-push-java-pipeline
  labels:
    pipeline.openshift.io/runtime: java
    pipeline.openshift.io/type: java
spec:
  description: >-
    This Pipeline test, build and deploy a simple quarkus service in knative.
  params:
    - name: IMAGE_NAME
      description: The fully qualified image name.
    - name: APP_NAME
      description: The app Name
    - name: GITHUB_REPO_URL
      description: The GitHub Repo of the Java Application
    - name: GITHUB_REPO_REVISION
      description: The GitHub revision to use
      default: main
  workspaces:
    - name: source
    - name: m2-repo
  tasks:
    - name: init-source-workspace
      taskSpec:
        workspaces:
          - name: source
        stepTemplate:
          securityContext:
            runAsUser: 0
        steps:
          - name: fix-permissions
            image: registry.access.redhat.com/ubi8/ubi-minimal:latest
            script: |
              #!/bin/sh
              chmod 777 $(workspaces.source.path)
              echo "source workspace permissions set to 777"
      workspaces:
        - name: source
          workspace: source
    - name: init-m2-workspace
      taskSpec:
        workspaces:
          - name: m2-repo
        stepTemplate:
          securityContext:
            runAsUser: 0
        steps:
          - name: fix-permissions
            image: registry.access.redhat.com/ubi8/ubi-minimal:latest
            script: |
              #!/bin/sh
              chmod 777 $(workspaces.m2-repo.path)
              echo "m2-repo workspace permissions set to 777"
      workspaces:
        - name: m2-repo
          workspace: m2-repo
    - name: clone-sources
      runAfter:
        - init-source-workspace
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.GITHUB_REPO_URL)
        - name: REVISION
          value: $(params.GITHUB_REPO_REVISION)
          # do a fresh clone
        - name: DELETE_EXISTING
          value: 'true'
      workspaces:
        - name: output
          workspace: source
    # - name: test-app
    #   taskRef:
    #     name: maven
    #     kind: ClusterTask
    #   runAfter:
    #     - clone-sources
    #   params:
    #     - name: GOALS
    #       value:
    #         - 'clean'
    #         - 'test'
    #   workspaces:
    #     - name: maven-settings
    #       workspace: m2-repo
    #     - name: source
    #       workspace: source
    - name: build-app
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: maven
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - clone-sources
        - init-m2-workspace
      params:
        - name: GOALS
          value:
            - '-DskipTests'
            - 'clean'
            - 'package'
      workspaces:
        - name: maven-settings
          workspace: m2-repo
        - name: source
          workspace: source
    - name: build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter:
        - build-app
      params:
        - name: IMAGE
          value: '$(params.IMAGE_NAME)'
        - name: TLSVERIFY
          value: 'false'
        - name: STORAGE_DRIVER
          value: vfs
        - name: BUILD_EXTRA_ARGS
          value: '--isolation=chroot --security-opt=unmask=/proc/*'
      workspaces:
        - name: source
          workspace: source
